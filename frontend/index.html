<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXUS — RAG Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ═══ RESET ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Palette ── */
  --ink:        #0a0c12;
  --ink-2:      #0f1219;
  --ink-3:      #151923;
  --ink-4:      #1c2230;
  --ink-5:      #232b3a;
  --line:       #1f2a3c;
  --line-soft:  #182030;

  --sky:        #4fb8ff;
  --sky-dim:    rgba(79,184,255,.1);
  --sky-glow:   rgba(79,184,255,.22);
  --sky-border: rgba(79,184,255,.28);

  --jade:       #3dffc0;
  --jade-dim:   rgba(61,255,192,.1);
  --jade-glow:  rgba(61,255,192,.2);

  --amber:      #ffb347;
  --amber-dim:  rgba(255,179,71,.1);

  --rose:       #ff5f7e;
  --rose-dim:   rgba(255,95,126,.12);
  --rose-glow:  rgba(255,95,126,.2);

  --white:      #e8eef8;
  --muted:      #4a5a72;
  --ghost:      #2a3548;

  --font:       'Space Grotesk', sans-serif;
  --mono:       'IBM Plex Mono', monospace;

  --r:          8px;
  --r-lg:       14px;
  --shadow:     0 8px 32px rgba(0,0,0,.55);
}

html, body, #root { height: 100%; }

body {
  font-family: var(--font);
  background: var(--ink);
  color: var(--white);
  overflow: hidden;
}

/* Dot-grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(79,184,255,.06) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

#root { position: relative; z-index: 1; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--sky); }

/* ═══ LAYOUT ══════════════════════════════════════════════════════════════ */
.layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ═══ SIDEBAR ══════════════════════════════════════════════════════════════ */
.sidebar {
  width: 272px;
  min-width: 272px;
  background: var(--ink-2);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Logo */
.sidebar-head {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.logo-mark {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--sky-dim), rgba(61,255,192,.08));
  border: 1px solid var(--sky-border);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 18px var(--sky-glow);
  flex-shrink: 0;
}

.logo-mark svg { width: 18px; height: 18px; }

.logo-info {}
.logo-name { font-size: 17px; font-weight: 700; letter-spacing: .06em; color: var(--white); }
.logo-tag  { font-size: 9px; font-family: var(--mono); color: var(--muted); letter-spacing: .14em; margin-top: 1px; }

.stat-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.pill {
  font-family: var(--mono);
  font-size: 9.5px;
  padding: 3px 9px;
  border-radius: 99px;
  background: var(--ink-4);
  border: 1px solid var(--line);
  color: var(--muted);
  letter-spacing: .04em;
}

.pill em { color: var(--sky); font-style: normal; font-weight: 600; }

/* Sidebar scroll body */
.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px 0;
}

/* ── Section label */
.section-label {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ghost);
  padding: 0 4px 8px;
  margin-top: 4px;
}

/* ── Add panel */
.add-panel {
  background: var(--ink-3);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 16px;
}

.add-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}

.add-header:hover { background: var(--ink-4); }

.add-icon {
  width: 24px; height: 24px;
  border-radius: 7px;
  background: var(--sky-dim);
  border: 1px solid var(--sky-border);
  display: flex; align-items: center; justify-content: center;
  color: var(--sky);
  font-size: 15px;
  flex-shrink: 0;
}

.add-label { font-size: 12px; font-weight: 500; color: var(--sky); flex: 1; }
.chevron { font-size: 9px; color: var(--muted); transition: transform .2s; }
.chevron.open { transform: rotate(180deg); }

.add-body { padding: 4px 14px 14px; }

/* Tabs */
.tabs {
  display: flex;
  gap: 3px;
  padding: 3px;
  background: var(--ink);
  border-radius: 9px;
  margin-bottom: 12px;
}

.tab-btn {
  flex: 1;
  padding: 5px 0;
  font-size: 10.5px;
  font-weight: 500;
  font-family: var(--font);
  border: none;
  border-radius: 7px;
  cursor: pointer;
  background: transparent;
  color: var(--muted);
  transition: all .15s;
}

.tab-btn.on {
  background: var(--sky-dim);
  color: var(--sky);
  border: 1px solid var(--sky-border);
}

.tab-btn:hover:not(.on) { color: var(--white); }

/* Inputs */
.field {
  width: 100%;
  padding: 8px 11px;
  font-size: 12px;
  font-family: var(--font);
  background: var(--ink);
  border: 1px solid var(--line);
  border-radius: var(--r);
  color: var(--white);
  outline: none;
  transition: border-color .15s;
  resize: none;
}

.field:focus { border-color: var(--sky); }
.field::placeholder { color: var(--ghost); }

.field-group { display: flex; flex-direction: column; gap: 8px; }

/* Drop zone */
.dropzone {
  border: 2px dashed var(--line);
  border-radius: var(--r);
  padding: 22px 12px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
}

.dropzone:hover, .dropzone.drag { border-color: var(--sky); background: var(--sky-dim); }
.dz-icon { font-size: 26px; margin-bottom: 7px; }
.dz-text { font-size: 11px; color: var(--muted); line-height: 1.6; }
.dz-text strong { color: var(--sky); }

/* Primary button */
.btn-primary {
  width: 100%;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  border-radius: var(--r);
  border: none;
  cursor: pointer;
  background: var(--sky);
  color: var(--ink);
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all .15s;
}

.btn-primary:hover:not(:disabled) { background: #75c8ff; transform: translateY(-1px); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* Doc list */
.doc-list { padding-bottom: 8px; }

.doc-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 6px;
  border-radius: var(--r);
  transition: background .15s;
  cursor: default;
}

.doc-row:hover { background: var(--ink-3); }

.badge {
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 5px;
  font-weight: 600;
  text-transform: uppercase;
  flex-shrink: 0;
}

.b-pdf { background: var(--rose-dim); color: var(--rose); border: 1px solid rgba(255,95,126,.3); }
.b-txt { background: var(--jade-dim); color: var(--jade); border: 1px solid rgba(61,255,192,.3); }
.b-url { background: var(--sky-dim);  color: var(--sky);  border: 1px solid var(--sky-border); }
.b-raw { background: var(--amber-dim);color: var(--amber);border: 1px solid rgba(255,179,71,.3); }
.b-q   { background: var(--ink-5);    color: var(--muted);border: 1px solid var(--line); }

.doc-name {
  font-size: 11px;
  color: var(--white);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.doc-n {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--muted);
  flex-shrink: 0;
}

.del-btn {
  background: none;
  border: none;
  color: var(--rose);
  cursor: pointer;
  font-size: 15px;
  padding: 0 2px;
  opacity: 0;
  transition: opacity .15s;
  flex-shrink: 0;
  line-height: 1;
}

.doc-row:hover .del-btn { opacity: 1; }

.empty-docs {
  font-size: 11px;
  color: var(--ghost);
  padding: 6px 6px;
  font-style: italic;
}

/* Sidebar footer */
.sidebar-foot {
  padding: 10px 12px 14px;
  border-top: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

.foot-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--r);
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  font-size: 11.5px;
  font-family: var(--font);
  cursor: pointer;
  transition: all .15s;
}

.foot-btn:hover { background: var(--ink-3); color: var(--white); border-color: var(--sky); }
.foot-icon { font-size: 14px; }

/* ═══ MAIN ════════════════════════════════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 24px;
  border-bottom: 1px solid var(--line);
  background: rgba(10,12,18,.85);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}

.topbar-title {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--sky);
  letter-spacing: .06em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-title::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--jade);
  box-shadow: 0 0 8px var(--jade-glow);
  animation: heartbeat 2.5s ease-in-out infinite;
}

@keyframes heartbeat {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .4; transform: scale(.7); }
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

.model-tag {
  font-family: var(--mono);
  font-size: 9.5px;
  padding: 4px 11px;
  background: var(--sky-dim);
  border: 1px solid var(--sky-border);
  border-radius: 99px;
  color: var(--sky);
  letter-spacing: .05em;
}

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ── Empty state */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  text-align: center;
  padding: 40px;
}

.empty-orb {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 1px solid var(--sky-border);
  background: radial-gradient(circle at 35% 35%, var(--sky-dim), transparent 70%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 40px var(--sky-glow), inset 0 0 20px var(--sky-dim);
  font-size: 30px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}

.empty-h { font-size: 24px; font-weight: 600; color: var(--white); }
.empty-p { font-size: 13px; color: var(--muted); max-width: 340px; line-height: 1.75; }

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 6px;
}

.chip {
  font-size: 11px;
  padding: 6px 15px;
  border-radius: 99px;
  background: var(--ink-3);
  border: 1px solid var(--line);
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}

.chip:hover { border-color: var(--sky); color: var(--sky); background: var(--sky-dim); }

/* ── Messages */
.msg { display: flex; flex-direction: column; gap: 7px; }
.msg.user { align-items: flex-end; }

.msg-who {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--ghost);
  padding: 0 3px;
  letter-spacing: .05em;
}

/* Enhanced query tag */
.eq {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--muted);
  background: var(--ink-3);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 4px 10px;
  margin-bottom: 2px;
}

.eq-arrow { color: var(--sky); }
.eq-val   { color: var(--white); font-size: 10px; }

/* Bubble */
.bubble {
  padding: 14px 18px;
  border-radius: var(--r-lg);
  font-size: 13.5px;
  line-height: 1.75;
  max-width: 84%;
  position: relative;
}

.msg.user .bubble {
  background: var(--sky-dim);
  border: 1px solid var(--sky-border);
  border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg);
  color: var(--white);
}

.msg.assistant .bubble {
  background: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: 4px var(--r-lg) var(--r-lg) var(--r-lg);
  max-width: 100%;
  width: 100%;
}

/* Markdown */
.bubble h1, .bubble h2, .bubble h3 { color: var(--white); margin: 14px 0 8px; font-weight: 600; }
.bubble h1 { font-size: 18px; }
.bubble h2 { font-size: 15px; }
.bubble h3 { font-size: 13px; color: var(--sky); }
.bubble p  { margin: 7px 0; }
.bubble ul, .bubble ol { padding-left: 22px; margin: 7px 0; }
.bubble li { margin: 4px 0; }
.bubble strong { color: var(--white); font-weight: 600; }
.bubble em     { color: var(--amber); font-style: normal; }
.bubble a      { color: var(--sky); text-decoration: none; }
.bubble a:hover{ text-decoration: underline; }
.bubble code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--ink-5);
  border: 1px solid var(--line);
  padding: 1px 6px;
  border-radius: 5px;
  color: var(--jade);
}
.bubble pre {
  background: #05080f;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 10px 0;
}
.bubble pre code { background: none; border: none; padding: 0; color: #9dbadc; }
.bubble blockquote {
  border-left: 3px solid var(--sky);
  padding-left: 14px;
  color: var(--muted);
  margin: 10px 0;
}
.bubble hr { border-color: var(--line); margin: 12px 0; }

/* Cursor */
.cursor {
  display: inline-block;
  width: 7px; height: 13px;
  background: var(--sky);
  margin-left: 3px;
  vertical-align: middle;
  border-radius: 2px;
  animation: blink .65s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Thinking dots */
.dots span {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--sky);
  margin: 0 2px;
  animation: dot .9s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .30s; }

@keyframes dot {
  0%, 80%, 100% { transform: translateY(0); opacity: .35; }
  40%            { transform: translateY(-5px); opacity: 1; }
}

/* Source cards */
.sources {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}

.src-card {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 9px 12px;
  background: var(--ink-3);
  border: 1px solid var(--line);
  border-radius: 10px;
  max-width: 250px;
  transition: border-color .15s;
}

.src-card:hover { border-color: var(--sky); }

.src-num {
  font-family: var(--mono);
  font-size: 8.5px;
  font-weight: 600;
  color: var(--sky);
  background: var(--sky-dim);
  border: 1px solid var(--sky-border);
  border-radius: 4px;
  padding: 2px 5px;
  flex-shrink: 0;
  margin-top: 1px;
}

.src-body { flex: 1; min-width: 0; }

.src-name {
  font-size: 10px;
  font-weight: 600;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.src-score {
  font-family: var(--mono);
  font-size: 9px;
  margin-top: 2px;
}

.score-hi  { color: var(--jade); }
.score-mid { color: var(--amber); }
.score-lo  { color: var(--rose); }

.src-preview {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ═══ INPUT BAR ═══════════════════════════════════════════════════════════ */
.input-bar {
  padding: 14px 24px 18px;
  border-top: 1px solid var(--line);
  background: rgba(10,12,18,.92);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}

.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 11px 13px;
  transition: border-color .2s, box-shadow .2s;
}

.input-wrap:focus-within {
  border-color: var(--sky);
  box-shadow: 0 0 0 3px rgba(79,184,255,.07);
}

.chat-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-size: 13.5px;
  font-family: var(--font);
  color: var(--white);
  resize: none;
  line-height: 1.55;
  max-height: 120px;
  min-height: 20px;
}

.chat-input::placeholder { color: var(--ghost); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 9px;
  border: none;
  background: var(--sky);
  color: var(--ink);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
}

.send-btn:hover:not(:disabled) { background: #75c8ff; transform: translateY(-1px); }
.send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

.input-hint {
  text-align: center;
  font-size: 9.5px;
  font-family: var(--mono);
  color: var(--ghost);
  margin-top: 8px;
  letter-spacing: .03em;
}

/* ═══ TOASTS ══════════════════════════════════════════════════════════════ */
.toast-wrap {
  position: fixed;
  bottom: 22px;
  right: 22px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  z-index: 9999;
}

.toast {
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow);
  animation: slide-in .2s ease;
}

@keyframes slide-in {
  from { transform: translateX(36px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

.t-ok   { background: var(--jade-dim);  border: 1px solid rgba(61,255,192,.3); color: var(--jade); }
.t-err  { background: var(--rose-dim);  border: 1px solid rgba(255,95,126,.3); color: var(--rose); }
.t-info { background: var(--sky-dim);   border: 1px solid var(--sky-border);   color: var(--sky);  }

input[type="file"] { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const BASE_URL = "https://nexus-rag-1.onrender.com";
const { useState, useEffect, useRef, useCallback } = React;

marked.setOptions({ breaks: true, gfm: true });

/* ── Markdown ──────────────────────────────────────────────────────────── */
function MD({ text }) {
  return <div dangerouslySetInnerHTML={{ __html: marked.parse(text || '') }} />;
}

/* ── Toasts ────────────────────────────────────────────────────────────── */
function Toasts({ list }) {
  return (
    <div className="toast-wrap">
      {list.map(t => (
        <div key={t.id} className={`toast t-${t.kind}`}>
          {t.kind === 'ok' ? '✓' : t.kind === 'err' ? '✕' : 'ℹ'}  {t.msg}
        </div>
      ))}
    </div>
  );
}

/* ── Source cards ──────────────────────────────────────────────────────── */
function Sources({ docs }) {
  if (!docs?.length) return null;
  return (
    <div className="sources">
      {docs.map((d, i) => {
        const cls = d.score > .7 ? 'score-hi' : d.score > .4 ? 'score-mid' : 'score-lo';
        return (
          <div key={i} className="src-card">
            <div className="src-num">Doc {i + 1}</div>
            <div className="src-body">
              <div className="src-name" title={d.source}>{d.source}</div>
              <div className={`src-score ${cls}`}>{(d.score * 100).toFixed(0)}% match</div>
              <div className="src-preview">{d.preview}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── Message ───────────────────────────────────────────────────────────── */
function Message({ m }) {
  const isUser = m.role === 'user';
  return (
    <div className={`msg ${m.role}`}>
      <div className="msg-who">{isUser ? '▸ you' : '◈ nexus'} · {m.time}</div>

      {m.eq && m.eq !== m.orig && (
        <div className="eq">
          🔍 <span className="eq-arrow">→</span>
          <span className="eq-val">{m.eq}</span>
        </div>
      )}

      <div className="bubble">
        {isUser ? (
          <span>{m.content}</span>
        ) : m.streaming && !m.content ? (
          <div className="dots"><span/><span/><span/></div>
        ) : (
          <>
            <MD text={m.content} />
            {m.streaming && <span className="cursor" />}
          </>
        )}
      </div>

      {!isUser && m.docs?.length > 0 && !m.streaming && (
        <Sources docs={m.docs} />
      )}
    </div>
  );
}

/* ── Add panel ─────────────────────────────────────────────────────────── */
function AddPanel({ onAdded, toast }) {
  const [open, setOpen]   = useState(false);
  const [tab,  setTab]    = useState('file');
  const [url,  setUrl]    = useState('');
  const [raw,  setRaw]    = useState('');
  const [name, setName]   = useState('');
  const [busy, setBusy]   = useState(false);
  const [drag, setDrag]   = useState(false);
  const fileRef           = useRef();

  const upload = async (file) => {
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    setBusy(true);
    try {
      const r = await fetch(`${BASE_URL}/api/upload`, { method: 'POST', body: fd });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Upload failed');
      toast(`✓ ${d.added} chunks from "${d.source}"`, 'ok');
      onAdded();
    } catch(e) { toast(e.message, 'err'); }
    finally { setBusy(false); }
  };

  const addUrl = async () => {
    if (!url.trim()) return;
    setBusy(true);
    try {
      const r = await fetch(`${BASE_URL}/api/add-url`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ url: url.trim() })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Failed');
      toast(`✓ ${d.added} chunks indexed`, 'ok');
      setUrl(''); onAdded();
    } catch(e) { toast(e.message, 'err'); }
    finally { setBusy(false); }
  };

  const addText = async () => {
    if (!raw.trim()) return;
    setBusy(true);
    try {
      const n = name.trim() || `paste_${Date.now()}`;
      const r = await fetch(`${BASE_URL}/api/add-text`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ text: raw, name: n })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Failed');
      toast(`✓ ${d.added} chunks as "${n}"`, 'ok');
      setRaw(''); setName(''); onAdded();
    } catch(e) { toast(e.message, 'err'); }
    finally { setBusy(false); }
  };

  return (
    <div className="add-panel">
      <div className="add-header" onClick={() => setOpen(o => !o)}>
        <div className="add-icon">+</div>
        <span className="add-label">Add Document</span>
        <span className={`chevron ${open ? 'open' : ''}`}>▾</span>
      </div>

      {open && (
        <div className="add-body">
          <div className="tabs">
            {[['file','📄 File'],['url','🌐 URL'],['text','📝 Text']].map(([k,l]) => (
              <button key={k} className={`tab-btn ${tab===k?'on':''}`} onClick={() => setTab(k)}>{l}</button>
            ))}
          </div>

          {tab === 'file' && (
            <div className="field-group">
              <div
                className={`dropzone ${drag ? 'drag' : ''}`}
                onClick={() => fileRef.current.click()}
                onDragOver={e => { e.preventDefault(); setDrag(true); }}
                onDragLeave={() => setDrag(false)}
                onDrop={e => { e.preventDefault(); setDrag(false); upload(e.dataTransfer.files[0]); }}
              >
                <div className="dz-icon">📂</div>
                <div className="dz-text">Drop <strong>PDF</strong> or <strong>TXT</strong><br/>or click to browse</div>
              </div>
              <input ref={fileRef} type="file" accept=".pdf,.txt,.md"
                onChange={e => upload(e.target.files[0])} />
            </div>
          )}

          {tab === 'url' && (
            <div className="field-group">
              <input className="field" placeholder="https://example.com/page"
                value={url} onChange={e => setUrl(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addUrl()} />
              <button className="btn-primary" onClick={addUrl} disabled={busy || !url.trim()}>
                {busy ? 'Fetching…' : '🌐 Fetch & Index'}
              </button>
            </div>
          )}

          {tab === 'text' && (
            <div className="field-group">
              <input className="field" placeholder="Name (optional)"
                value={name} onChange={e => setName(e.target.value)} />
              <textarea className="field" rows={5} placeholder="Paste text here…"
                value={raw} onChange={e => setRaw(e.target.value)} />
              <button className="btn-primary" onClick={addText} disabled={busy || !raw.trim()}>
                {busy ? 'Processing…' : '📝 Add Text'}
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Sidebar ───────────────────────────────────────────────────────────── */
function Sidebar({ stats, docs, onRefresh, onClear, onExport, toast }) {
  const del = async (src) => {
    if (!confirm(`Remove "${src}"?`)) return;
    try {
      const r = await fetch(`${BASE_URL}/api/documents/${encodeURIComponent(src)}`, { method: 'DELETE' });
      const d = await r.json();
      toast(`Removed ${d.deleted} chunks`, 'ok');
      onRefresh();
    } catch { toast('Delete failed', 'err'); }
  };

  const badge = t => ({ pdf:'b-pdf', txt:'b-txt', url:'b-url', raw:'b-raw' }[t] || 'b-q');

  return (
    <div className="sidebar">
      <div className="sidebar-head">
        <div className="logo">
          <div className="logo-mark">
            <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 1L16.5 5.5V12.5L9 17L1.5 12.5V5.5L9 1Z" stroke="#4fb8ff" strokeWidth="1.2" fill="none"/>
              <circle cx="9" cy="9" r="2.5" fill="#4fb8ff" opacity=".8"/>
              <line x1="9" y1="1" x2="9" y2="6.5" stroke="#4fb8ff" strokeWidth=".8" opacity=".4"/>
              <line x1="9" y1="11.5" x2="9" y2="17" stroke="#4fb8ff" strokeWidth=".8" opacity=".4"/>
              <line x1="16.5" y1="5.5" x2="11.2" y2="7.8" stroke="#4fb8ff" strokeWidth=".8" opacity=".4"/>
              <line x1="1.5" y1="5.5" x2="6.8" y2="7.8" stroke="#4fb8ff" strokeWidth=".8" opacity=".4"/>
              <line x1="16.5" y1="12.5" x2="11.2" y2="10.2" stroke="#4fb8ff" strokeWidth=".8" opacity=".4"/>
              <line x1="1.5" y1="12.5" x2="6.8" y2="10.2" stroke="#4fb8ff" strokeWidth=".8" opacity=".4"/>
            </svg>
          </div>
          <div className="logo-info">
            <div className="logo-name">NEXUS</div>
            <div className="logo-tag">RAG Intelligence</div>
          </div>
        </div>
        <div className="stat-pills">
          <div className="pill"><em>{stats.doc_count}</em> docs</div>
          <div className="pill"><em>{stats.chunk_count}</em> chunks</div>
          <div className="pill"><em>{stats.turn_count}</em> turns</div>
        </div>
      </div>

      <div className="sidebar-body">
        <AddPanel onAdded={onRefresh} toast={toast} />

        <div className="section-label">Indexed Documents</div>
        <div className="doc-list">
          {docs.length === 0
            ? <div className="empty-docs">No documents yet</div>
            : docs.map((d, i) => (
              <div key={i} className="doc-row">
                <span className={`badge ${badge(d.doc_type)}`}>{d.doc_type}</span>
                <span className="doc-name" title={d.source}>{d.source}</span>
                <span className="doc-n">{d.chunks}</span>
                <button className="del-btn" onClick={() => del(d.source)} title="Remove">×</button>
              </div>
            ))
          }
        </div>
      </div>

      <div className="sidebar-foot">
        <button className="foot-btn" onClick={onClear}>
          <span className="foot-icon">🗑</span> Clear conversation
        </button>
        <button className="foot-btn" onClick={onExport}>
          <span className="foot-icon">💾</span> Export session
        </button>
      </div>
    </div>
  );
}

/* ── Empty state ───────────────────────────────────────────────────────── */
const HINTS = [
  'Summarise the main topics',
  'What are the key findings?',
  'Compare different sections',
  'List all important dates',
];

function Empty({ hasDocs, onHint }) {
  return (
    <div className="empty">
      <div className="empty-orb">◈</div>
      <div className="empty-h">{hasDocs ? 'Ask NEXUS anything' : 'Start with a document'}</div>
      <div className="empty-p">
        {hasDocs
          ? 'Your knowledge base is ready. Ask any question and NEXUS will retrieve relevant context and answer with citations.'
          : 'Upload a PDF, paste a URL, or add text in the sidebar. NEXUS will index and retrieve from your documents.'}
      </div>
      {hasDocs && (
        <div className="chips">
          {HINTS.map((h, i) => (
            <div key={i} className="chip" onClick={() => onHint(h)}>{h}</div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── App ───────────────────────────────────────────────────────────────── */
function App() {
  const [msgs,      setMsgs]    = useState([]);
  const [docs,      setDocs]    = useState([]);
  const [stats,     setStats]   = useState({ doc_count:0, chunk_count:0, turn_count:0, model:'…' });
  const [query,     setQuery]   = useState('');
  const [busy,      setBusy]    = useState(false);
  const [toasts,    setToasts]  = useState([]);

  const endRef   = useRef();
  const inputRef = useRef();

  const toast = useCallback((msg, kind = 'info') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, kind }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);

  const now = () => new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  const refresh = useCallback(async () => {
    const [s, d] = await Promise.all([
     fetch(`${BASE_URL}/api/stats`).then(r => r.json()),
      fetch(`${BASE_URL}/api/documents`).then(r => r.json()),
    ]);
    setStats(s);
    setDocs(d.documents || []);
  }, []);

  useEffect(() => { refresh(); }, []);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const send = async (q) => {
    const text = (q || query).trim();
    if (!text || busy) return;
    if (stats.chunk_count === 0) { toast('Add documents first', 'err'); return; }

    setQuery('');
    setBusy(true);

    const uid = `u_${Date.now()}`;
    const bid = `b_${Date.now()}`;

    setMsgs(p => [
      ...p,
      { id: uid, role: 'user',      content: text, time: now() },
      { id: bid, role: 'assistant', content: '',   time: now(), streaming: true, docs: [], eq: '', orig: text },
    ]);

    try {
      const res = await fetch(`${BASE_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: text }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Error'); }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buf     = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.type === 'enhanced_query')
              setMsgs(p => p.map(m => m.id === bid ? { ...m, eq: ev.content } : m));
            else if (ev.type === 'token')
              setMsgs(p => p.map(m => m.id === bid ? { ...m, content: m.content + ev.content } : m));
            else if (ev.type === 'docs')
              setMsgs(p => p.map(m => m.id === bid ? { ...m, docs: ev.docs } : m));
            else if (ev.type === 'done') {
              setMsgs(p => p.map(m => m.id === bid ? { ...m, streaming: false } : m));
              setBusy(false);
              refresh();
            } else if (ev.type === 'error')
              throw new Error(ev.content);
          } catch {}
        }
      }
    } catch (e) {
      toast(e.message, 'err');
      setMsgs(p => p.map(m => m.id === (msgs.at(-1)?.id)
        ? { ...m, content: `⚠ ${e.message}`, streaming: false } : m));
      setBusy(false);
    }
  };

  const clear = async () => {
    await fetch(`${BASE_URL}/api/history`, { method: 'DELETE' });
    setMsgs([]);
    setStats(s => ({ ...s, turn_count: 0 }));
    toast('Conversation cleared', 'info');
  };

  const exportSession = () => {
    if (!msgs.length) { toast('Nothing to export', 'err'); return; }
    window.open(`${BASE_URL}/api/export`, '_blank');
    toast('Exporting…', 'info');
  };

  return (
    <div className="layout">
      <Sidebar
        stats={stats} docs={docs}
        onRefresh={refresh} onClear={clear} onExport={exportSession} toast={toast}
      />

      <div className="main">
        <div className="topbar">
          <div className="topbar-title">NEXUS Chat Interface</div>
          <div className="topbar-right">
            <div className="model-tag">{stats.model}</div>
          </div>
        </div>

        <div className="messages">
          {msgs.length === 0
            ? <Empty hasDocs={stats.chunk_count > 0} onHint={send} />
            : msgs.map(m => <Message key={m.id} m={m} />)
          }
          <div ref={endRef} />
        </div>

        <div className="input-bar">
          <div className="input-wrap">
            <textarea
              ref={inputRef}
              className="chat-input"
              rows={1}
              placeholder={stats.chunk_count === 0
                ? 'Add documents first…'
                : 'Ask anything about your documents… (Shift+Enter for newline)'}
              value={query}
              onChange={e => {
                setQuery(e.target.value);
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
              }}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
              disabled={busy}
            />
            <button className="send-btn" onClick={() => send()}
              disabled={busy || !query.trim()}>
              {busy ? '…' : '▶'}
            </button>
          </div>
          <div className="input-hint">
            MMR retrieval · query enhancement · {stats.model} via Groq
          </div>
        </div>
      </div>

      <Toasts list={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
